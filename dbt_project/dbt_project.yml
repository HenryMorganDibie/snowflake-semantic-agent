name: 'snowflake_semantic_agent'
version: '1.0.0'
config-version: 2

profile: 'snowflake_semantic_agent'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  snowflake_semantic_agent:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

semantic_models:
  snowflake_semantic_agent:
    +schema: semantic
